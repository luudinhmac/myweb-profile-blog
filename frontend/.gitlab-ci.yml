stages:
  - sync
  - build
  - staging
  - deploy_prod

variables:
  DOCKER_DRIVER: overlay2
  CI_REGISTRY: docker.io
  IMAGE_NAME: $CI_REGISTRY_USER/portfolio-frontend
  IMAGE_TAG: $IMAGE_NAME:$CI_COMMIT_TAG
  IMAGE_LATEST: $IMAGE_NAME:latest

sync_api:
  stage: sync
  image: node:22-alpine
  tags:
    - agent-1
  script:
    - corepack enable && corepack prepare pnpm@latest --activate
    - pnpm install --no-frozen-lockfile
    - |
      if [ -n "$BACKEND_SWAGGER_URL" ]; then
        echo "Fetching Swagger spec from $BACKEND_SWAGGER_URL"
        curl -sSL $BACKEND_SWAGGER_URL -o backend-swagger.json
        export SWAGGER_PATH="./backend-swagger.json"
      else
        echo "BACKEND_SWAGGER_URL not set, assuming local file exists at path in package.json"
      fi
    - pnpm run api:sync
  artifacts:
    paths:
      - src/types/api.generated.ts
    expire_in: 1 week
  allow_failure: true
  only:
    - /^v.*$/

build_frontend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  tags:
    - agent-1
  # needs:
  #   - sync_api
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --pull -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  after_script:
    - docker image prune -f
  only:
    - /^v.*$/

deploy_staging:
  stage: staging
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  tags:
    - agent-1
  script:
    - kubectl set image deployment/frontend frontend=$IMAGE_TAG -n portfolio
  only:
    - /^v.*$/

deploy_prod:
  stage: deploy_prod
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  tags:
    - agent-2
  script:
    - kubectl set image deployment/frontend frontend=$IMAGE_TAG -n portfolio
  when: manual
  only:
    - /^v.*$/
