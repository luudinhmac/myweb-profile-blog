stages:
  - sync
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  CI_REGISTRY: docker.io
  IMAGE_NAME: $CI_REGISTRY_USER/portfolio-frontend
  IMAGE_TAG: $IMAGE_NAME:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $IMAGE_NAME:latest
  K8S_NAMESPACE: portfolio
  TZ: Asia/Ho_Chi_Minh
  INTERNAL_API_URL: "http://portfolio-backend-staging:3001"

.notify_template: &notify_template
  after_script:
    - sh .gitlab-ci/notify.sh $CI_JOB_STATUS $CI_JOB_STAGE

sync_api:
  stage: sync
  image: node:22-alpine
  tags:
    - agent-1
  script:
    - corepack enable && corepack prepare pnpm@latest --activate
    - pnpm install --no-frozen-lockfile
    - |
      if [ -n "$BACKEND_SWAGGER_URL" ]; then
        echo "Fetching Swagger spec from $BACKEND_SWAGGER_URL"
        curl -sSL $BACKEND_SWAGGER_URL -o backend-swagger.json
        export SWAGGER_PATH="./backend-swagger.json"
      fi
    - pnpm run api:sync
  artifacts:
    paths:
      - src/types/api.generated.ts
    expire_in: 1 week
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'

build_staging:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  tags:
    - agent-1
  before_script:
    - 'docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY'
  script:
    - 'export TAG="dev-$CI_COMMIT_SHORT_SHA"'
    - 'echo "Building Staging Image with Tag: $TAG"'
    - 'docker build --no-cache --pull --build-arg INTERNAL_API_URL=$INTERNAL_API_URL -t $IMAGE_NAME:$TAG -t $IMAGE_LATEST .'
    - 'docker push $IMAGE_NAME:$TAG'
    - 'docker push $IMAGE_LATEST'
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

build_production:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  tags:
    - agent-1
  before_script:
    - 'docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY'
  script:
    - 'export TAG=$CI_COMMIT_TAG'
    - 'echo "Building Production Image with Tag: $TAG"'
    - 'docker build --no-cache --pull --build-arg INTERNAL_API_URL=$INTERNAL_API_URL -t $IMAGE_NAME:$TAG -t $IMAGE_LATEST .'
    - 'docker push $IMAGE_NAME:$TAG'
    - 'docker push $IMAGE_LATEST'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'

# 1. Tự động Deploy lên STAGING khi push vào nhánh dev
deploy_staging:
  stage: deploy
  image: alpine:latest
  tags:
    - agent-1
  script:
    - 'apk add --no-cache git'
    - 'git config --global user.email "ci-bot@luumac.io.vn"'
    - 'git config --global user.name "CI Bot"'
    - 'git clone https://oauth2:${GITLAB_API_TOKEN}@gitlab.com/portfolio-macld/portfolio-infratructure.git infra-repo'
    - 'cd infra-repo'
    - 'sed -i "s/tag: .*/tag: \"dev-$CI_COMMIT_SHORT_SHA\"/" environments/staging/frontend-values.yaml'
    - 'git add environments/staging/frontend-values.yaml'
    - 'git commit -m "chore(deploy): update frontend to dev-$CI_COMMIT_SHORT_SHA [skip ci]" || echo "No changes to commit"'
    - 'git push origin main'
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

# 2. Thủ công Deploy lên PRODUCTION khi đánh Tag (ví dụ v1.0.0)
deploy_production:
  stage: deploy
  image: alpine:latest
  tags:
    - agent-1
  script:
    - 'apk add --no-cache git'
    - 'git config --global user.email "ci-bot@luumac.io.vn"'
    - 'git config --global user.name "CI Bot"'
    - 'git clone https://oauth2:${GITLAB_API_TOKEN}@gitlab.com/portfolio-macld/portfolio-infratructure.git infra-repo'
    - 'cd infra-repo'
    - 'sed -i "s/tag: .*/tag: \"$CI_COMMIT_TAG\"/" environments/production/frontend-values.yaml'
    - 'git add environments/production/frontend-values.yaml'
    - 'git commit -m "chore(deploy): update frontend to $CI_COMMIT_TAG [skip ci]" || echo "No changes to commit"'
    - 'git push origin main'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
      when: manual
      allow_failure: false
