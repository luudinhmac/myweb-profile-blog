services:
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../../frontend/.env
    restart: always

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ../../backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
