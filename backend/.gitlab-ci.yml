stages:
  - build
  - migrate
  - staging
  - deploy_prod

variables:
  DOCKER_DRIVER: overlay2
  CI_REGISTRY: docker.io
  IMAGE_NAME: $CI_REGISTRY_USER/portfolio-backend
  IMAGE_TAG: $IMAGE_NAME:$CI_COMMIT_TAG
  IMAGE_LATEST: $IMAGE_NAME:latest
  K8S_NAMESPACE: portfolio
  K8S_DEPLOYMENT_NAME: portfolio-backend
  K8S_CONTAINER_NAME: backend

build_backend:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  tags:
    - agent-1
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --pull -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  after_script:
    - docker rmi $IMAGE_TAG $IMAGE_LATEST || true
    - docker image prune -f
  only:
    - /^v.*$/

deploy_staging:
  stage: staging
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  tags:
    - agent-1
  script:
    - kubectl set image deployment/$K8S_DEPLOYMENT_NAME $K8S_CONTAINER_NAME=$IMAGE_TAG -n $K8S_NAMESPACE
    - kubectl rollout status deployment/$K8S_DEPLOYMENT_NAME -n $K8S_NAMESPACE --timeout=120s
    - BACKEND_POD=$(kubectl get pods -n $K8S_NAMESPACE -l app=$K8S_DEPLOYMENT_NAME -o jsonpath='{.items[0].metadata.name}')
    - kubectl exec -n $K8S_NAMESPACE $BACKEND_POD -- npx prisma db push --accept-data-loss
    - kubectl exec -n $K8S_NAMESPACE $BACKEND_POD -- node dist/src/database/seed.js
  only:
    - /^v.*$/

deploy_prod:
  stage: deploy_prod
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  tags:
    - agent-2
  script:
    - kubectl set image deployment/$K8S_DEPLOYMENT_NAME $K8S_CONTAINER_NAME=$IMAGE_TAG -n $K8S_NAMESPACE
  when: manual
  only:
    - /^v.*$/
