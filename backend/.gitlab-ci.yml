stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  CI_REGISTRY: docker.io
  IMAGE_NAME: $CI_REGISTRY_USER/portfolio-backend
  IMAGE_TAG: $IMAGE_NAME:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $IMAGE_NAME:latest
  K8S_NAMESPACE: portfolio
  TZ: Asia/Ho_Chi_Minh

.notify_template: &notify_template
  after_script:
    - sh .gitlab-ci/notify.sh $CI_JOB_STATUS $CI_JOB_STAGE

.k8s_auth: &k8s_auth
  before_script:
    - echo "$KUBE_CONFIG_BASE64" | base64 -d > kubeconfig
    - export KUBECONFIG=$PWD/kubeconfig

build_staging:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  tags:
    - agent-1
  before_script:
    - 'docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY'
  script:
    - 'export TAG="dev-$CI_COMMIT_SHORT_SHA"'
    - 'echo "Building Staging Image with Tag: $TAG"'
    - 'docker build --pull -t $IMAGE_NAME:$TAG -t $IMAGE_LATEST .'
    - 'docker push $IMAGE_NAME:$TAG'
    - 'docker push $IMAGE_LATEST'
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

build_production:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  tags:
    - agent-1
  before_script:
    - 'docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY'
  script:
    - 'export TAG=$CI_COMMIT_TAG'
    - 'echo "Building Production Image with Tag: $TAG"'
    - 'docker build --pull -t $IMAGE_NAME:$TAG -t $IMAGE_LATEST .'
    - 'docker push $IMAGE_NAME:$TAG'
    - 'docker push $IMAGE_LATEST'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'

deploy_staging:
  stage: deploy
  image: alpine:latest
  tags:
    - agent-1
  script:
    - 'apk add --no-cache git'
    - 'git config --global user.email "ci-bot@luumac.io.vn"'
    - 'git config --global user.name "CI Bot"'
    - 'git clone https://oauth2:${GITLAB_API_TOKEN}@gitlab.com/portfolio-macld/portfolio-infratructure.git infra-repo'
    - 'cd infra-repo'
    - 'sed -i "s/tag: .*/tag: \"dev-$CI_COMMIT_SHORT_SHA\"/" environments/staging/backend-values.yaml'
    - 'git add environments/staging/backend-values.yaml'
    - 'git commit -m "chore(deploy): update backend to dev-$CI_COMMIT_SHORT_SHA [skip ci]" || echo "No changes to commit"'
    - 'git push origin main'
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

deploy_production:
  stage: deploy
  image: alpine:latest
  tags:
    - agent-1
  script:
    - 'apk add --no-cache git'
    - 'git config --global user.email "ci-bot@luumac.io.vn"'
    - 'git config --global user.name "CI Bot"'
    - 'git clone https://oauth2:${GITLAB_API_TOKEN}@gitlab.com/portfolio-macld/portfolio-infratructure.git infra-repo'
    - 'cd infra-repo'
    - 'sed -i "s/tag: .*/tag: \"$CI_COMMIT_TAG\"/" environments/production/backend-values.yaml'
    - 'git add environments/production/backend-values.yaml'
    - 'git commit -m "chore(deploy): update backend to $CI_COMMIT_TAG [skip ci]" || echo "No changes to commit"'
    - 'git push origin main'
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
      when: manual
      allow_failure: false
