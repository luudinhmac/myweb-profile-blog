---
# Master Playbook for Portfolio Deployment

- name: Provision Infrastructure
  hosts: all
  become: yes
  roles:
    - role: docker
      tags: infra,docker
    - role: postgres
      tags: infra,postgres
    - role: nginx
      tags: infra,nginx

- name: Deploy Application
  hosts: all
  become: yes
  roles:
    - role: app-deploy
      tags: app,deploy
