---
- name: Deploy Portfolio Application
  hosts: portfolio_vms
  become: yes
  vars:
    project_root: "/home/macld/portfolio"

  tasks:
    - name: Ensure project directory exists
      file:
        path: "{{ project_root }}"
        state: directory
        owner: macld

    - name: Copy docker-compose files
      copy:
        src: ../docker-compose.yml
        dest: "{{ project_root }}/docker-compose.yml"

    - name: Deploy services with Docker Compose
      docker_compose:
        project_src: "{{ project_root }}"
        state: present
        build: yes
        pull: yes
