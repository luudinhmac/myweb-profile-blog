---
- name: Deploy Portfolio Application to Kubernetes
  hosts: k8s_server
  become: yes
  tasks:
    - name: Ensure project directory exists
      file:
        path: /data/Portfolio
        state: directory
        owner: macld
        group: macld

    - name: Fetch latest code from GitHub
      shell: git fetch origin && git checkout feature/clean-architecture-migration && git reset --hard origin/feature/clean-architecture-migration
      delegate_to: localhost
      become: no
      args:
        chdir: /data/Portfolio

    - name: Sync source code to k8s node
      synchronize:
        src: /data/Portfolio/
        dest: /data/Portfolio/
        delete: yes
        recursive: yes
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=.next"
          - "--exclude=.git"
      become: no
  
  roles:
    - app/k8s-deploy
