---
# Playbook to deploy the application to the Staging environment (internal VM)
- name: Deploy Fullstack Application to Staging
  hosts: staging_server
  become: yes
  vars:
    # Basic application directory on the remote server
    app_root: "/opt/portfolio-staging"
    
    # Database configuration - retrieved from environment variables for security
    db_user: "{{ lookup('env', 'STAGING_DB_USER') | default('staging_user', true) }}"
    db_password: "{{ lookup('env', 'STAGING_DB_PASSWORD') }}"
    db_name: "{{ lookup('env', 'STAGING_DB_NAME') | default('portfolio_staging', true) }}"
    
    # Domain configuration
    domain_name: "{{ lookup('env', 'STAGING_DOMAIN') | default('staging.local', true) }}"
    
    # SSL method: self-signed is used for internal staging environment
    ssl_method: "self-signed"

    # JWT Secret
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') | default('p0rtf0l1o_m1gration_secret_key_123456', true) }}"

    # Swagger Documentation
    enable_swagger: "true"
  
  roles:
    - common       # Basic system setup
    - docker       # Install Docker & Docker Compose
    - app/backend  # Prepare backend files & .env
    - app/frontend # Prepare frontend files & .env
    - ssl          # Generate SSL certificates
    - nginx        # Configure Nginx & Start services via Docker Compose

  post_tasks:
    # Apply database schema to the database (using db push as there are no migrations yet)
    - name: Sync database schema (db push)
      command: docker exec portfolio-backend npx prisma db push --accept-data-loss

    # Ensure Prisma Client is generated for the seeding step
    - name: Generate Prisma Client
      command: docker exec portfolio-backend npx prisma generate

    # Seed the database with initial data (Admin user, settings, etc.)
    - name: Seed database with default settings
      command: docker exec portfolio-backend npx prisma db seed
