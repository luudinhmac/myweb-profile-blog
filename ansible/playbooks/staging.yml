---
- name: Deploy Fullstack Application to Staging
  hosts: staging_server
  become: yes
  vars:
    app_root: "/opt/portfolio"
    db_user: "macld"
    db_password: "macld@2026"
    db_name: "portfolio_db"
  
  roles:
    - common
    - docker
    - app/backend
    - app/frontend
    - ssl
    - nginx

  post_tasks:
    - name: Sync database schema (db push)
      command: docker exec portfolio-backend npx prisma db push --accept-data-loss

    - name: Generate Prisma Client (ensure schema is up-to-date for seed)
      command: docker exec portfolio-backend npx prisma generate

    - name: Seed database with default settings and admin user
      command: docker exec portfolio-backend npx prisma db seed
