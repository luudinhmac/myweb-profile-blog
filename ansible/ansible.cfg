[defaults]
inventory = inventory.ini
roles_path = roles
host_key_checking = False
remote_user = macld
interpreter_python = auto_silent
# Note: Initial run might require password if keys aren't shared yet.
# Once keys are shared (roles/common), password won't be needed.
private_key_file = ~/.ssh/id_ed25519_ansible

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
