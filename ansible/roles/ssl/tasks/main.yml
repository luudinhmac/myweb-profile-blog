---
# --- Self-Signed Certificate Section (Staging) ---

# Create directory for self-signed certificates
- name: Create SSL directory for self-signed
  file:
    path: "{{ app_root }}/nginx/ssl"
    state: directory
  when: ssl_method == 'self-signed'

# Check if certificates already exist to avoid regenerating every time
- name: Check if self-signed SSL certificate exists
  stat:
    path: "{{ app_root }}/nginx/ssl/server.crt"
  register: self_signed_cert
  when: ssl_method == 'self-signed'

# Generate a new self-signed certificate if it doesn't exist
- name: Generate self-signed SSL certificate
  command: >
    openssl req -x509 -nodes -days 365 -newkey rsa:2048
    -keyout {{ app_root }}/nginx/ssl/server.key
    -out {{ app_root }}/nginx/ssl/server.crt
    -subj "/C=US/ST=State/L=City/O=Organization/OU=Unit/CN={{ domain_name }}"
  when: ssl_method == 'self-signed' and not self_signed_cert.stat.exists

# --- Let's Encrypt Section (Production) ---

# Install required tools for SSL generation on the host
- name: Install certbot for Let's Encrypt
  apt:
    name: 
      - certbot
      - python3-certbot-nginx
    state: present
    update_cache: yes
  when: ssl_method == 'letsencrypt'

# Generate certificates using standalone mode (requires port 80 to be free temporarily)
- name: Generate Let's Encrypt certificate
  command: >
    certbot certonly --standalone --non-interactive --agree-tos
    --email {{ cert_email | default('admin@' + domain_name) }}
    -d {{ domain_name }}
  args:
    creates: "/etc/letsencrypt/live/{{ domain_name }}/fullchain.pem"
  when: ssl_method == 'letsencrypt'

# Add a cron job to automatically renew certificates. 
# Runs on the 1st day of every month at 3:00 AM.
- name: Add cron job for Let's Encrypt renewal
  cron:
    name: "Certbot renewal"
    day: "1"
    hour: "3"
    minute: "0"
    job: "certbot renew --quiet --post-hook 'docker restart portfolio-nginx'"
  when: ssl_method == 'letsencrypt'
