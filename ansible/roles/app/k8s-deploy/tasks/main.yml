---
- name: Create data directories for k8s
  file:
    path: "{{ item }}"
    state: directory
    mode: '0775'
    owner: macld
    group: macld
    recurse: yes
  loop:
    - /data/k8s
    - /data/k8s/postgres-data
    - /data/k8s/uploads
    - /data/k8s/manifests

- name: Sync k8s manifests
  become_user: macld
  synchronize:
    src: "{{ playbook_dir }}/../../k8s/"
    dest: /data/k8s/manifests/

- name: Build Frontend Image on k8s node
  # Build the production image using Docker. This ensures the image is available locally.
  command: docker build -t portfolio-frontend:latest -f frontend/Dockerfile .
  args:
    chdir: /data/Portfolio

- name: Export Frontend Image and Import to Containerd
  # Kubernetes (containerd) cannot directly see images built in Docker's Moby storage.
  # We export the image to a tarball and import it into containerd's 'k8s.io' namespace.
  shell: docker save portfolio-frontend:latest | ctr -n k8s.io images import -

- name: Build Backend Image on k8s node
  command: docker build -t portfolio-backend:latest -f backend/Dockerfile .
  args:
    chdir: /data/Portfolio

- name: Export Backend Image and Import to Containerd
  shell: docker save portfolio-backend:latest | ctr -n k8s.io images import -

- name: Apply K8s Namespace
  become_user: macld
  command: kubectl apply -f /data/k8s/manifests/namespace.yaml

- name: Apply App ConfigMap
  become_user: macld
  command: kubectl apply -f /data/k8s/manifests/app-config.yaml

- name: Check if portfolio-secrets exists
  become_user: macld
  command: kubectl get secret portfolio-secrets -n portfolio
  register: secret_check
  failed_when: false
  changed_when: false

- name: Get existing JWT_SECRET if available
  become_user: macld
  shell: kubectl get secret portfolio-secrets -n portfolio -o jsonpath='{.data.JWT_SECRET}' | base64 -d
  register: existing_jwt_secret
  when: secret_check.rc == 0
  failed_when: false
  changed_when: false

- name: Set JWT_SECRET fact
  set_fact:
    jwt_secret: "{{ (secret_check.rc == 0 and existing_jwt_secret.stdout != '') | ternary(existing_jwt_secret.stdout, lookup('password', '/dev/null chars=ascii_letters,digits length=32')) }}"

- name: Create K8s App Secrets
  # We create secrets dynamically. JWT_SECRET is now auto-generated and persistent.
  become_user: macld
  shell: |
    kubectl create secret generic portfolio-secrets \
    --from-literal=DATABASE_URL="postgresql://staging_user:macld%402026@postgres:5432/portfolio_staging" \
    --from-literal=JWT_SECRET="{{ jwt_secret }}" \
    -n portfolio --dry-run=client -o yaml | kubectl apply -f -

- name: Generate Self-Signed SSL for K8s
  become_user: macld
  command: openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /home/macld/tls.key -out /home/macld/tls.crt -subj "/CN=192.168.157.110"
  args:
    creates: /home/macld/tls.crt

- name: Create K8s SSL Secret
  become_user: macld
  shell: kubectl create secret tls portfolio-ssl --cert=/home/macld/tls.crt --key=/home/macld/tls.key -n portfolio --dry-run=client -o yaml | kubectl apply -f -

- name: Apply Dashboard NodePort
  become_user: macld
  command: kubectl apply -f /data/k8s/manifests/nginx/dashboard-nodeport.yaml

- name: Apply K8s Manifests
  become_user: macld
  command: kubectl apply -f /data/k8s/manifests/{{ item }}/deployment.yaml
  loop:
    - postgres
    - backend
    - frontend
    - nginx

- name: Wait for Postgres to be ready
  become_user: macld
  shell: kubectl wait --for=condition=available --timeout=60s deployment/postgres -n portfolio

- name: Wait for Backend to be ready
  become_user: macld
  shell: kubectl wait --for=condition=available --timeout=60s deployment/backend -n portfolio

- name: Run Prisma DB Push
  become_user: macld
  shell: kubectl exec -n portfolio deployment/backend -- npx prisma db push --accept-data-loss

- name: Run Prisma DB Seed
  become_user: macld
  shell: kubectl exec -n portfolio deployment/backend -- npx prisma db seed
