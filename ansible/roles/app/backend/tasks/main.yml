---
- name: Create backend directory
  file:
    path: "{{ app_root }}/backend"
    state: directory

- name: Synchronize backend source code
  synchronize:
    src: "{{ playbook_dir }}/../../backend/"
    dest: "{{ app_root }}/backend/"
    recursive: yes
    delete: yes
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=dist"
      - "--exclude=.env"
      - "--exclude=.git"

- name: Generate .env.staging for backend
  template:
    src: .env.staging.j2
    dest: "{{ app_root }}/backend/.env"
