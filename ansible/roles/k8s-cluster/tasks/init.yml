---
- name: Check if k8s is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_init

- name: Initialize k8s cluster
  # Initialize the Kubernetes control plane using kubeadm with the Flannel CNI pod network CIDR
  command: kubeadm init --pod-network-cidr=10.244.0.0/16
  when: not k8s_init.stat.exists

- name: Create .kube directory for macld
  file:
    path: /home/macld/.kube
    state: directory
    owner: macld
    group: macld
    mode: '0755'

- name: Copy admin.conf to macld's .kube
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/macld/.kube/config
    remote_src: yes
    owner: macld
    group: macld
    mode: '0600'

- name: Install Flannel CNI
  # Deploy Flannel as the pod network overlay to enable cross-pod communication
  become_user: macld
  command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml

- name: Remove taint from control-plane node (allow running pods on master)
  # By default, control-plane nodes don't run regular pods. We remove the taint to allow single-node deployment.
  become_user: macld
  command: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
  ignore_errors: yes
