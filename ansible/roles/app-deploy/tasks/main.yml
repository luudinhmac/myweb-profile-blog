---
- name: Ensure target directory exists
  file:
    path: "{{ env_path }}"
    state: directory
    owner: "{{ ansible_user }}"
    mode: '0755'

- name: Sync source code to VM
  synchronize:
    src: ../../
    dest: "{{ env_path }}"
    recursive: yes
    delete: yes
    rsync_opts:
      - "--exclude=.git"
      - "--exclude=node_modules"
      - "--exclude=frontend/node_modules"
      - "--exclude=backend/node_modules"
  become: no

- name: Create Backend .env file from template
  template:
    src: env.j2
    dest: "{{ env_path }}/backend/.env"

- name: Create Frontend .env file from template
  template:
    src: frontend_env.j2
    dest: "{{ env_path }}/frontend/.env"

- name: Deploy with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ env_path }}/deployment/docker"
    state: present
    build: yes
    remove_orphans: true
    files:
      - "{{ 'docker-compose.yml' if env_name == 'production' else 'docker-compose.dev.yml' }}"
