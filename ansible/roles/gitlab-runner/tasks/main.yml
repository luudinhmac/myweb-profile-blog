---
- name: Install GitLab Runner binary on Build Agent
  when: "'build' in group_names"
  block:
    - name: Download GitLab Runner binary
      get_url:
        url: https://gitlab-runner-downloads.s3.amazonaws.com/latest/binaries/gitlab-runner-linux-amd64
        dest: /usr/local/bin/gitlab-runner
        mode: '0755'

    - name: Create GitLab Runner user
      user:
        name: gitlab-runner
        system: yes
        groups: docker
        append: yes

    - name: Install and start GitLab Runner service
      command: gitlab-runner install --user=gitlab-runner --working-directory=/home/gitlab-runner
      args:
        creates: /etc/systemd/system/gitlab-runner.service

    - name: Ensure GitLab Runner is started
      service:
        name: gitlab-runner
        state: started
        enabled: yes

    - name: Check if Runner is already registered
      shell: gitlab-runner list 2>&1 | grep -q "glrt-"
      register: runner_check
      failed_when: false
      changed_when: false

    - name: Register GitLab Runner (Agent 1)
      command: |
        gitlab-runner register \
        --non-interactive \
        --url "https://gitlab.com/" \
        --token "{{ RUNNER_TOKEN_STAGING }}" \
        --executor "docker" \
        --docker-image "docker:latest" \
        --docker-volumes "/var/run/docker.sock:/var/run/docker.sock" \
        --description "Agent 1 - Build VM" \
        --maintenance-note "Managed by Ansible"
      when: runner_check.rc != 0

- name: Install Helm on K8s Nodes
  when: "'staging_k8s' in group_names or 'production' in group_names"
  block:
    - name: Download Helm install script
      get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: '0700'

    - name: Run Helm install script
      command: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

- name: Deploy GitLab Runner (Agent 2) to K8s
  when: "'production' in group_names"
  block:
    - name: Add GitLab Helm repository
      become_user: macld
      command: helm repo add gitlab https://charts.gitlab.io

    - name: Update Helm repositories
      become_user: macld
      command: helm repo update

    - name: Check if GitLab Runner is already deployed
      become_user: macld
      command: helm list -n gitlab-runner
      register: helm_list
      changed_when: false

    - name: Create gitlab-runner namespace
      become_user: macld
      command: kubectl create namespace gitlab-runner
      ignore_errors: yes

    - name: Deploy GitLab Runner via Helm
      become_user: macld
      command: |
        helm upgrade --install gitlab-runner gitlab/gitlab-runner \
        --namespace gitlab-runner \
        --set gitlabUrl=https://gitlab.com/ \
        --set runnerRegistrationToken={{ GITLAB_RUNNER_TOKEN_PROD }} \
        --set rbac.create=true
      when: "'gitlab-runner' not in helm_list.stdout"
