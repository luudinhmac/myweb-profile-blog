---
- name: Install acme.sh dependencies
  apt:
    name:
      - curl
      - socat
    state: present
    update_cache: yes

- name: Install acme.sh
  shell: "curl https://get.acme.sh | sh"
  args:
    creates: "~/.acme.sh/acme.sh"

- name: Register acme.sh account
  shell: "~/.acme.sh/acme.sh --register-account -m {{ acme_email }}"
  args:
    creates: "~/.acme.sh/ca"

- name: Issue wildcard certificate via DNS-01 Cloudflare
  shell: |
    export CF_Token="{{ cloudflare_token }}"
    ~/.acme.sh/acme.sh --issue --dns dns_cf -d {{ acme_domain }} -d "*.{{ acme_domain }}"
  args:
    creates: "~/.acme.sh/{{ acme_domain }}/fullchain.cer"
  environment:
    CF_Token: "{{ cloudflare_token }}"

- name: Create SSL directory for Nginx
  file:
    path: "{{ ssl_cert_path }}"
    state: directory
    mode: '0755'

- name: Install certificate to Nginx directory
  shell: |
    ~/.acme.sh/acme.sh --install-cert -d {{ acme_domain }} \
    --key-file {{ ssl_cert_path }}/privkey.pem \
    --fullchain-file {{ ssl_cert_path }}/fullchain.pem \
    --reloadcmd "systemctl reload nginx"
  args:
    creates: "{{ ssl_cert_path }}/fullchain.pem"
