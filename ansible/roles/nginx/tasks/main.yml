---
# Stop and disable native nginx service to avoid port 80/443 conflict with Docker container
- name: Stop and disable native nginx service if exists
  service:
    name: nginx
    state: stopped
    enabled: no
  ignore_errors: yes

# Create the directory where nginx configuration and SSL certs will be stored on the host
- name: Create nginx directory
  file:
    path: "{{ app_root }}/nginx"
    state: directory

# Generate the main nginx configuration file from template
- name: Generate Nginx configuration
  template:
    src: nginx.conf.j2
    dest: "{{ app_root }}/nginx/nginx.conf"

# Generate the docker-compose file that orchestrates all services (app, db, nginx)
- name: Generate Docker Compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ app_root }}/docker-compose.yml"

# Launch the application using Docker Compose. --build ensures latest changes are included.
- name: Run Docker Compose
  become: yes
  command: docker compose -f {{ app_root }}/docker-compose.yml up -d --build
  register: docker_compose_output

# Log the output of docker-compose command for debugging purposes
- name: Display Docker Compose output
  debug:
    var: docker_compose_output.stdout_lines
