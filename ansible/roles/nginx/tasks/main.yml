---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Include ACME SSL tasks if enabled
  include_tasks: acme.yml
  when: enable_ssl | bool

- name: Ensure Nginx is started and enabled
  service:
    name: nginx
    state: started
    enabled: yes

- name: Create Nginx configuration from template
  template:
    src: vhost.conf.j2
    dest: "/etc/nginx/sites-available/{{ project_name }}_{{ env_name }}.conf"
  notify: reload nginx

- name: Enable Nginx configuration
  file:
    src: "/etc/nginx/sites-available/{{ project_name }}_{{ env_name }}.conf"
    dest: "/etc/nginx/sites-enabled/{{ project_name }}_{{ env_name }}.conf"
    state: link
  notify: reload nginx

- name: Remove default nginx configuration
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx
