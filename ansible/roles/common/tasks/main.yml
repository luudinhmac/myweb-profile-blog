---
- name: Update apt cache and upgrade packages
  apt:
    update_cache: yes
    upgrade: dist
  when: ansible_os_family == "Debian"

- name: Install basic packages
  apt:
    name:
      - curl
      - git
      - vim
      - unzip
      - software-properties-common
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
  when: ansible_os_family == "Debian"

- name: Generate SSH key on control node if not exists
  delegate_to: localhost
  become: false
  user:
    name: "{{ ansible_user }}"
    generate_ssh_key: yes
    ssh_key_type: ed25519
    ssh_key_file: .ssh/id_ed25519_ansible
  run_once: true

- name: Fetch public key from control node
  delegate_to: localhost
  become: false
  slurp:
    src: "~/.ssh/id_ed25519_ansible.pub"
  register: control_node_pub_key
  run_once: true

- name: Add control node public key to staging server authorized_keys
  authorized_key:
    user: "{{ ansible_user }}"
    state: present
    key: "{{ control_node_pub_key['content'] | b64decode }}"
